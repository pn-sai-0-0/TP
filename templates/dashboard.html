<!DOCTYPE html>
<html>
<body>
<h2>Welcome, {{ name }}</h2>
<a href="/add_tree">Add Tree</a> | <a href="/logout">Logout</a>
<h3>My Trees</h3>
{% if trees %}
<table border="1">
  <tr><th>Name</th><th>Planted Date</th><th>Actions</th></tr>
  {% for tree in trees %}
  <tr>
    <td>{{ tree[1] }}</td>
    <td>{{ tree[2] }}</td>
    <td>
      <a href="/add_growth/{{ tree[0] }}">Add Growth</a> |
      <a href="/view_growth/{{ tree[0] }}">View Growth</a>
    </td>
  </tr>
  {% endfor %}
</table>
{% else %}
<p>No trees yet. <a href="/add_tree">Add one</a></p>
{% endif %}
</body>
</html>
